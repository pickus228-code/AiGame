<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Три в ряд</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        canvas {
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            touch-action: none;
            max-width: 100vw;
            max-height: 100vh;
        }
        
        @media (max-width: 620px) {
            canvas {
                border-radius: 0;
                max-width: 100vw;
                max-height: 100vh;
                width: 100vw;
                height: 100vh;
            }
            body {
                background: #1a1a2e;
                padding: 0;
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Адаптивные размеры
        let WIDTH = 600;
        let HEIGHT = 700;
        let GRID_SIZE = 8;
        let CELL_SIZE = WIDTH / GRID_SIZE;
        let MARGIN = 8;
        let TOP_OFFSET = 100;
        let isMobile = false;
        
        // Цветовые темы
        const COLOR_THEMES = {
            'Обычные': {
                0: [255, 80, 80],
                1: [80, 255, 80],
                2: [80, 80, 255],
                3: [255, 255, 80],
                4: [255, 80, 255],
                5: [80, 255, 255]
            },
            'Пастельные': {
                0: [255, 180, 180],
                1: [180, 255, 180],
                2: [180, 180, 255],
                3: [255, 255, 180],
                4: [255, 180, 255],
                5: [180, 255, 255]
            },
            'Яркие': {
                0: [255, 0, 0],
                1: [0, 255, 0],
                2: [0, 0, 255],
                3: [255, 255, 0],
                4: [255, 0, 255],
                5: [0, 255, 255]
            },
            'Темные': {
                0: [180, 50, 50],
                1: [50, 180, 50],
                2: [50, 50, 180],
                3: [180, 180, 50],
                4: [180, 50, 180],
                5: [50, 180, 180]
            },
            'Неоновые': {
                0: [255, 50, 50],
                1: [50, 255, 50],
                2: [50, 50, 255],
                3: [255, 255, 50],
                4: [255, 50, 255],
                5: [50, 255, 255]
            },
            'Мятные': {
                0: [200, 100, 150],
                1: [100, 220, 200],
                2: [150, 180, 255],
                3: [255, 220, 150],
                4: [220, 150, 255],
                5: [150, 255, 220]
            }
        };
        
        // Только белый и черный
        const BORDER_COLORS = [
            { name: 'Белый', color: [255, 255, 255] },
            { name: 'Черный', color: [0, 0, 0] }
        ];
        
        // Формы фишек (для каждого цвета своя)
        const COLOR_SHAPES = {
            0: 'square',    // Красный - квадрат
            1: 'diamond',   // Зеленый - ромб
            2: 'hexagon',   // Синий - шестиугольник
            3: 'star',      // Желтый - звезда
            4: 'circle',    // Розовый - круг
            5: 'triangle'   // Голубой - треугольник
        };
        
        // Названия форм для отображения
        const SHAPE_NAMES = {
            'square': 'Квадрат',
            'circle': 'Круг',
            'triangle': 'Треугольник',
            'diamond': 'Ромб',
            'star': 'Звезда',
            'hexagon': 'Шестиугольник'
        };
        
        // Все доступные формы для меню
        const ALL_SHAPES = ['Квадрат', 'Круг', 'Треугольник', 'Ромб', 'Звезда', 'Шестиугольник'];
        
        // ==================== АДАПТАЦИЯ ====================
        function resizeCanvas() {
            const maxWidth = window.innerWidth;
            const maxHeight = window.innerHeight;
            
            isMobile = maxWidth < 768;
            
            if (isMobile) {
                const ratio = 600 / 700;
                let w = maxWidth;
                let h = maxWidth / ratio;
                
                if (h > maxHeight) {
                    h = maxHeight;
                    w = maxHeight * ratio;
                }
                
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                
                const logicalWidth = 600;
                const logicalHeight = 700;
                
                canvas.width = logicalWidth;
                canvas.height = logicalHeight;
                
                WIDTH = logicalWidth;
                HEIGHT = logicalHeight;
                CELL_SIZE = WIDTH / GRID_SIZE;
                TOP_OFFSET = 80;
                MARGIN = 6;
            } else {
                canvas.style.width = '600px';
                canvas.style.height = '700px';
                canvas.width = 600;
                canvas.height = 700;
                
                WIDTH = 600;
                HEIGHT = 700;
                CELL_SIZE = WIDTH / GRID_SIZE;
                TOP_OFFSET = 100;
                MARGIN = 8;
            }
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 300);
        });
        
        // ==================== КЛАСС ИГРЫ ====================
        class MatchThreeGame {
            constructor() {
                resizeCanvas();
                
                this.running = true;
                this.gameState = "MENU";
                this.gameMode = "CLASSIC";
                this.currentLevel = 1;
                this.nextLevel = 1;
                this.levelTarget = 100;
                this.highScore = 0;
                this.bestScores = { CLASSIC: 0, LEVELS: {}, NEXT_LEVEL: 1 };
                this.bgObjects = [];
                this.bgAnimationTimer = 0;
                
                // Настройки
                this.currentTheme = 'Обычные';
                this.currentBorderColor = 'Белый';
                this.currentShapeMode = 'individual'; // 'individual' или 'uniform'
                this.COLORS = JSON.parse(JSON.stringify(COLOR_THEMES['Обычные']));
                this.borderColor = [255, 255, 255];
                this.uniformShape = 'Квадрат';
                
                // Анимационные данные
                this.fallingCells = [];
                this.removingCells = [];
                this.swapAnimation = [];
                this.moveAnimation = [];
                
                // Состояния перетаскивания
                this.isDragging = false;
                this.dragStartCell = null;
                this.dragCurrentCell = null;
                this.dragTrail = [];
                
                // UI состояния
                this.showThemeMenu = false;
                this.showBorderMenu = false;
                this.showShapeMenu = false;
                
                this.loadScores();
                this.loadSettings();
                this.createBackgroundObjects();
                this.resetGame();
                
                this.setupEventListeners();
                this.gameLoop();
            }
            
            createBackgroundObjects() {
                this.bgObjects = [];
                const colorValues = Object.values(this.COLORS);
                const count = isMobile ? 10 : 12;
                for (let i = 0; i < count; i++) {
                    const color = colorValues[Math.floor(Math.random() * colorValues.length)];
                    this.bgObjects.push({
                        x: Math.random() * WIDTH,
                        y: Math.random() * HEIGHT,
                        size: 20 + Math.random() * (isMobile ? 30 : 40),
                        color: color,
                        speedX: (Math.random() - 0.5) * 0.4,
                        speedY: (Math.random() - 0.5) * 0.4,
                        alpha: 15 + Math.random() * 30
                    });
                }
            }
            
            loadScores() {
                try {
                    const data = JSON.parse(localStorage.getItem('matchThreeScores'));
                    if (data) {
                        this.bestScores = data;
                        this.highScore = data.CLASSIC || 0;
                        this.nextLevel = data.NEXT_LEVEL || 1;
                        this.currentLevel = this.nextLevel;
                        const levelKey = String(this.currentLevel);
                        if (data.LEVELS && data.LEVELS[levelKey]) {
                            this.levelTarget = data.LEVELS[levelKey];
                        } else {
                            this.levelTarget = 50 + (this.currentLevel - 1) * 50;
                        }
                    }
                } catch(e) {
                    this.bestScores = { CLASSIC: 0, LEVELS: {}, NEXT_LEVEL: 1 };
                    this.highScore = 0;
                    this.currentLevel = 1;
                    this.nextLevel = 1;
                    this.levelTarget = 100;
                }
            }
            
            loadSettings() {
                try {
                    const settings = JSON.parse(localStorage.getItem('matchThreeSettings'));
                    if (settings) {
                        this.currentTheme = settings.theme || 'Обычные';
                        this.currentBorderColor = settings.borderColor || 'Белый';
                        this.currentShapeMode = settings.shapeMode || 'individual';
                        this.uniformShape = settings.uniformShape || 'Квадрат';
                        this.COLORS = JSON.parse(JSON.stringify(COLOR_THEMES[this.currentTheme] || COLOR_THEMES['Обычные']));
                        const border = BORDER_COLORS.find(b => b.name === this.currentBorderColor);
                        this.borderColor = border ? border.color : [255, 255, 255];
                    }
                } catch(e) {
                    this.currentTheme = 'Обычные';
                    this.currentBorderColor = 'Белый';
                    this.currentShapeMode = 'individual';
                    this.uniformShape = 'Квадрат';
                    this.COLORS = JSON.parse(JSON.stringify(COLOR_THEMES['Обычные']));
                    this.borderColor = [255, 255, 255];
                }
            }
            
            saveSettings() {
                try {
                    const settings = {
                        theme: this.currentTheme,
                        borderColor: this.currentBorderColor,
                        shapeMode: this.currentShapeMode,
                        uniformShape: this.uniformShape
                    };
                    localStorage.setItem('matchThreeSettings', JSON.stringify(settings));
                } catch(e) {}
            }
            
            changeTheme(themeName) {
                this.currentTheme = themeName;
                this.COLORS = JSON.parse(JSON.stringify(COLOR_THEMES[themeName]));
                this.saveSettings();
                this.createBackgroundObjects();
            }
            
            changeBorderColor(colorName) {
                this.currentBorderColor = colorName;
                const border = BORDER_COLORS.find(b => b.name === colorName);
                if (border) {
                    this.borderColor = border.color;
                }
                this.saveSettings();
            }
            
            changeShapeMode(mode) {
                this.currentShapeMode = mode;
                this.saveSettings();
            }
            
            changeUniformShape(shapeName) {
                this.uniformShape = shapeName;
                this.saveSettings();
            }
            
            getShapeForColor(colorIndex) {
                if (this.currentShapeMode === 'uniform') {
                    return this.uniformShape;
                }
                const shapeKey = COLOR_SHAPES[colorIndex] || 'square';
                return SHAPE_NAMES[shapeKey] || 'Квадрат';
            }
            
            saveScores() {
                try {
                    this.bestScores.NEXT_LEVEL = this.nextLevel;
                    localStorage.setItem('matchThreeScores', JSON.stringify(this.bestScores));
                } catch(e) {}
            }
            
            saveCurrentScore() {
                if (this.gameMode === "CLASSIC") {
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        this.bestScores.CLASSIC = this.highScore;
                        this.saveScores();
                    }
                } else {
                    const levelKey = String(this.currentLevel);
                    if (!this.bestScores.LEVELS[levelKey] || this.score > this.bestScores.LEVELS[levelKey]) {
                        this.bestScores.LEVELS[levelKey] = this.score;
                        this.bestScores.NEXT_LEVEL = this.nextLevel;
                        this.saveScores();
                    }
                }
            }
            
            resetGame() {
                this.grid = [];
                for (let r = 0; r < GRID_SIZE; r++) {
                    this.grid[r] = [];
                    for (let c = 0; c < GRID_SIZE; c++) {
                        this.grid[r][c] = 0;
                    }
                }
                this.score = 0;
                this.selected = null;
                this.isAnimating = false;
                this.moves = 0;
                this.gameOver = false;
                this.levelCompleteShown = false;
                
                this.fallingCells = [];
                this.removingCells = [];
                this.swapAnimation = [];
                this.moveAnimation = [];
                
                this.isDragging = false;
                this.dragStartCell = null;
                this.dragCurrentCell = null;
                this.dragTrail = [];
                
                this.fillGrid();
                
                if (!this.hasValidMoves()) {
                    this.shuffleGrid();
                }
            }
            
            fillGrid() {
                const colorKeys = Object.keys(this.COLORS).map(Number);
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        const available = [...colorKeys];
                        if (col >= 2 && this.grid[row][col-1] === this.grid[row][col-2]) {
                            const idx = available.indexOf(this.grid[row][col-1]);
                            if (idx !== -1) available.splice(idx, 1);
                        }
                        if (row >= 2 && this.grid[row-1][col] === this.grid[row-2][col]) {
                            const idx = available.indexOf(this.grid[row-1][col]);
                            if (idx !== -1) available.splice(idx, 1);
                        }
                        this.grid[row][col] = available[Math.floor(Math.random() * available.length)];
                    }
                }
                this.processMatches();
            }
            
            shuffleGrid() {
                const colors = [];
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        if (this.grid[row][col] !== -1) {
                            colors.push(this.grid[row][col]);
                        }
                    }
                }
                
                for (let i = colors.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [colors[i], colors[j]] = [colors[j], colors[i]];
                }
                
                let idx = 0;
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        if (this.grid[row][col] !== -1) {
                            this.grid[row][col] = colors[idx++];
                        }
                    }
                }
                
                this.processMatches();
                
                if (!this.hasValidMoves()) {
                    this.shuffleGrid();
                }
            }
            
            hasValidMoves() {
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        if (this.grid[row][col] === -1) continue;
                        
                        const directions = [[-1,0], [1,0], [0,-1], [0,1]];
                        for (const [dr, dc] of directions) {
                            const nr = row + dr;
                            const nc = col + dc;
                            if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && this.grid[nr][nc] !== -1) {
                                [this.grid[row][col], this.grid[nr][nc]] = [this.grid[nr][nc], this.grid[row][col]];
                                const hasMatch = this.findMatches().length > 0;
                                [this.grid[row][col], this.grid[nr][nc]] = [this.grid[nr][nc], this.grid[row][col]];
                                if (hasMatch) return true;
                            }
                        }
                    }
                }
                return false;
            }
            
            getCellRect(row, col) {
                const x = col * CELL_SIZE + MARGIN;
                const y = row * CELL_SIZE + MARGIN + TOP_OFFSET;
                const size = CELL_SIZE - 2 * MARGIN;
                return { x, y, width: size, height: size };
            }
            
            getCellCenter(row, col) {
                const rect = this.getCellRect(row, col);
                return { x: rect.x + rect.width / 2, y: rect.y + rect.height / 2 };
            }
            
            findMatches() {
                const matches = new Set();
                
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE - 2; col++) {
                        if (this.grid[row][col] !== -1 &&
                            this.grid[row][col] === this.grid[row][col+1] &&
                            this.grid[row][col] === this.grid[row][col+2]) {
                            matches.add(`${row},${col}`);
                            matches.add(`${row},${col+1}`);
                            matches.add(`${row},${col+2}`);
                        }
                    }
                }
                
                for (let row = 0; row < GRID_SIZE - 2; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        if (this.grid[row][col] !== -1 &&
                            this.grid[row][col] === this.grid[row+1][col] &&
                            this.grid[row][col] === this.grid[row+2][col]) {
                            matches.add(`${row},${col}`);
                            matches.add(`${row+1},${col}`);
                            matches.add(`${row+2},${col}`);
                        }
                    }
                }
                
                return Array.from(matches).map(s => {
                    const [r, c] = s.split(',').map(Number);
                    return [r, c];
                });
            }
            
            processMatches() {
                const matches = this.findMatches();
                if (matches.length === 0) return false;
                
                this.score += matches.length * 10;
                
                for (const [row, col] of matches) {
                    this.removingCells.push({
                        row, col,
                        size: CELL_SIZE - 2 * MARGIN,
                        speed: 5
                    });
                    this.grid[row][col] = -1;
                }
                
                this.isAnimating = true;
                return true;
            }
            
            dropDown() {
                let dropped = false;
                
                for (let col = 0; col < GRID_SIZE; col++) {
                    let emptyCount = 0;
                    for (let row = GRID_SIZE - 1; row >= 0; row--) {
                        if (this.grid[row][col] === -1) {
                            emptyCount++;
                        } else if (emptyCount > 0) {
                            this.grid[row + emptyCount][col] = this.grid[row][col];
                            this.grid[row][col] = -1;
                            
                            this.fallingCells.push({
                                row: row + emptyCount,
                                col: col,
                                offset: -emptyCount * CELL_SIZE,
                                speed: 12
                            });
                            dropped = true;
                        }
                    }
                    
                    for (let row = 0; row < emptyCount; row++) {
                        if (this.grid[row][col] === -1) {
                            this.grid[row][col] = Math.floor(Math.random() * Object.keys(this.COLORS).length);
                            this.fallingCells.push({
                                row: row,
                                col: col,
                                offset: -(emptyCount - row) * CELL_SIZE - CELL_SIZE,
                                speed: 12
                            });
                            dropped = true;
                        }
                    }
                }
                
                if (this.fallingCells.length > 0) {
                    this.isAnimating = true;
                    return true;
                }
                return dropped;
            }
            
            updateAnimation() {
                if (this.removingCells.length > 0) {
                    for (const rem of this.removingCells) {
                        rem.size -= rem.speed;
                    }
                    this.removingCells = this.removingCells.filter(rem => rem.size > 0);
                    
                    if (this.removingCells.length === 0) {
                        this.dropDown();
                    }
                    return;
                }
                
                if (this.fallingCells.length > 0) {
                    for (const fall of this.fallingCells) {
                        fall.offset += fall.speed;
                        if (fall.offset >= 0) fall.offset = 0;
                    }
                    this.fallingCells = this.fallingCells.filter(fall => fall.offset < 0);
                    
                    if (this.fallingCells.length === 0) {
                        this.isAnimating = false;
                        if (this.processMatches()) {
                            this.isAnimating = true;
                        } else {
                            this.selected = null;
                            if (!this.hasValidMoves()) {
                                this.handleNoMoves();
                            }
                        }
                    }
                    return;
                }
                
                if (this.swapAnimation.length > 0) {
                    let allDone = true;
                    for (const swap of this.swapAnimation) {
                        if (swap.progress < 1) {
                            swap.progress += 0.1;
                            const t = swap.progress;
                            swap.dx = swap.startDx * (1 - t) + swap.endDx * t;
                            swap.dy = swap.startDy * (1 - t) + swap.endDy * t;
                            allDone = false;
                        } else {
                            swap.dx = swap.endDx;
                            swap.dy = swap.endDy;
                        }
                    }
                    
                    if (allDone) {
                        this.swapAnimation = [];
                        if (this.processMatches()) {
                            this.isAnimating = true;
                        } else {
                            this.isAnimating = false;
                            this.selected = null;
                            if (!this.hasValidMoves()) {
                                this.handleNoMoves();
                            }
                        }
                    }
                    return;
                }
                
                if (!this.isAnimating && this.removingCells.length === 0 && 
                    this.fallingCells.length === 0 && this.swapAnimation.length === 0) {
                    if (this.processMatches()) {
                        this.isAnimating = true;
                    }
                }
            }
            
            handleNoMoves() {
                if (this.gameMode === "CLASSIC") {
                    this.gameOver = true;
                    this.saveCurrentScore();
                } else {
                    this.shuffleGrid();
                }
            }
            
            animateSwap(pos1, pos2) {
                const [row1, col1] = pos1;
                const [row2, col2] = pos2;
                
                const center1 = this.getCellCenter(row1, col1);
                const center2 = this.getCellCenter(row2, col2);
                
                this.swapAnimation.push({
                    row: row1, col: col1,
                    dx: 0, dy: 0,
                    startDx: 0, startDy: 0,
                    endDx: center2.x - center1.x,
                    endDy: center2.y - center1.y,
                    progress: 0
                });
                
                this.swapAnimation.push({
                    row: row2, col: col2,
                    dx: 0, dy: 0,
                    startDx: 0, startDy: 0,
                    endDx: center1.x - center2.x,
                    endDy: center1.y - center2.y,
                    progress: 0
                });
                
                this.isAnimating = true;
            }
            
            swapCells(pos1, pos2) {
                if (!pos1 || !pos2) return false;
                const [row1, col1] = pos1;
                const [row2, col2] = pos2;
                
                if (!(row1 >= 0 && row1 < GRID_SIZE && col1 >= 0 && col1 < GRID_SIZE &&
                      row2 >= 0 && row2 < GRID_SIZE && col2 >= 0 && col2 < GRID_SIZE)) {
                    return false;
                }
                
                if (!this.isAdjacent(pos1, pos2)) return false;
                if (this.grid[row1][col1] === -1 || this.grid[row2][col2] === -1) return false;
                
                [this.grid[row1][col1], this.grid[row2][col2]] = [this.grid[row2][col2], this.grid[row1][col1]];
                return true;
            }
            
            trySwap(pos1, pos2) {
                if (this.isAnimating) return false;
                if (!pos1 || !pos2) return false;
                if (!this.isAdjacent(pos1, pos2)) return false;
                
                const gridCopy = this.grid.map(row => [...row]);
                
                if (this.swapCells(pos1, pos2)) {
                    if (this.findMatches().length > 0) {
                        this.animateSwap(pos1, pos2);
                        return true;
                    } else {
                        this.grid = gridCopy;
                        return false;
                    }
                }
                return false;
            }
            
            isAdjacent(pos1, pos2) {
                if (!pos1 || !pos2) return false;
                const [row1, col1] = pos1;
                const [row2, col2] = pos2;
                return Math.abs(row1 - row2) + Math.abs(col1 - col2) === 1;
            }
            
            getGridPos(mx, my) {
                if (my < TOP_OFFSET) return null;
                const col = Math.floor(mx / CELL_SIZE);
                const row = Math.floor((my - TOP_OFFSET) / CELL_SIZE);
                if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE) {
                    return [row, col];
                }
                return null;
            }
            
            // ==================== РИСОВАНИЕ ФИГУР ====================
            
            drawShape(ctx, shape, x, y, width, height, color, borderColor, isSelected) {
                const cx = x + width / 2;
                const cy = y + height / 2;
                const size = Math.min(width, height) / 2 - 2;
                
                ctx.save();
                ctx.translate(cx, cy);
                
                ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                ctx.strokeStyle = `rgb(${borderColor[0]}, ${borderColor[1]}, ${borderColor[2]})`;
                ctx.lineWidth = Math.max(1.5, 2 * (isMobile ? 0.8 : 1));
                
                switch(shape) {
                    case 'Квадрат':
                        ctx.beginPath();
                        ctx.roundRect(-size, -size, size * 2, size * 2, 4);
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    case 'Круг':
                        ctx.beginPath();
                        ctx.arc(0, 0, size, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    case 'Треугольник':
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(-size * 0.866, size * 0.5);
                        ctx.lineTo(size * 0.866, size * 0.5);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    case 'Ромб':
                        ctx.beginPath();
                        ctx.moveTo(0, -size);
                        ctx.lineTo(size, 0);
                        ctx.lineTo(0, size);
                        ctx.lineTo(-size, 0);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    case 'Звезда':
                        ctx.beginPath();
                        const spikes = 5;
                        const outerRadius = size;
                        const innerRadius = size * 0.4;
                        for (let i = 0; i < spikes * 2; i++) {
                            const radius = i % 2 === 0 ? outerRadius : innerRadius;
                            const angle = (i * Math.PI) / spikes - Math.PI / 2;
                            if (i === 0) ctx.moveTo(radius * Math.cos(angle), radius * Math.sin(angle));
                            else ctx.lineTo(radius * Math.cos(angle), radius * Math.sin(angle));
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    case 'Шестиугольник':
                        ctx.beginPath();
                        for (let i = 0; i < 6; i++) {
                            const angle = (i * Math.PI * 2) / 6 - Math.PI / 2;
                            const r = size;
                            if (i === 0) ctx.moveTo(r * Math.cos(angle), r * Math.sin(angle));
                            else ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle));
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        break;
                        
                    default:
                        ctx.beginPath();
                        ctx.roundRect(-size, -size, size * 2, size * 2, 4);
                        ctx.fill();
                        ctx.stroke();
                }
                
                ctx.restore();
            }

                    if (this.bestScores.LEVELS && this.bestScores.LEVELS[levelKey]) {
                        ctx.fillStyle = '#c8c8c8';
                        ctx.fillText(`Рекорд: ${this.bestScores.LEVELS[levelKey]}`, 220, 85);
                    }
                }
                
                // Кнопки
                const btnW = isMobile ? 70 : 100;
                const btnH = isMobile ? 28 : 35;
                const menuBtn = { x: WIDTH - btnW - 10, y: 55, w: btnW, h: btnH };
                ctx.fillStyle = '#4646c8';
                ctx.beginPath();
                ctx.roundRect(menuBtn.x, menuBtn.y, menuBtn.w, menuBtn.h, 8);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(menuBtn.x, menuBtn.y, menuBtn.w, menuBtn.h, 8);
                ctx.stroke();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = `${isMobile ? 10 : 14}px Arial`;
                ctx.fillStyle = '#ffffff';
                ctx.fillText('Меню', menuBtn.x + menuBtn.w/2, menuBtn.y + menuBtn.h/2);
                
                const resetBtn = { x: WIDTH - btnW * 2 - 20, y: 55, w: btnW, h: btnH };
                ctx.fillStyle = '#c84646';
                ctx.beginPath();
                ctx.roundRect(resetBtn.x, resetBtn.y, resetBtn.w, resetBtn.h, 8);
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(resetBtn.x, resetBtn.y, resetBtn.w, resetBtn.h, 8);
                ctx.stroke();
                ctx.fillStyle = '#ffffff';
                ctx.fillText('Сброс', resetBtn.x + resetBtn.w/2, resetBtn.y + resetBtn.h/2);
                
                this._menuBtn = menuBtn;
                this._resetBtn = resetBtn;
                
                // Рисуем сетку
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        if (this.grid[row][col] === -1) continue;
                        
                        const rect = this.getCellRect(row, col);
                        const colorIndex = this.grid[row][col];
                        const color = this.COLORS[colorIndex];
                        const shape = this.getShapeForColor(colorIndex);
                        
                        let fallOffset = 0;
                        for (const fall of this.fallingCells) {
                            if (fall.row === row && fall.col === col) {
                                fallOffset = fall.offset;
                                break;
                            }
                        }
                        
                        let isRemoving = false;
                        let remSize = 0;
                        for (const rem of this.removingCells) {
                            if (rem.row === row && rem.col === col) {
                                isRemoving = true;
                                remSize = rem.size;
                                break;
                            }
                        }
                        
                        let swapOffset = { x: 0, y: 0 };
                        for (const swap of this.swapAnimation) {
                            if (swap.row === row && swap.col === col) {
                                swapOffset = { x: swap.dx, y: swap.dy };
                                break;
                            }
                        }
                        
                        let moveOffset = { x: 0, y: 0 };
                        for (const move of this.moveAnimation) {
                            if (move.row === row && move.col === col) {
                                moveOffset = { x: move.dx, y: move.dy };
                                break;
                            }
                        }
                        
                        if (isRemoving) {
                            const cx = rect.x + rect.width / 2;
                            const cy = rect.y + rect.height / 2;
                            ctx.fillStyle = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                            ctx.beginPath();
                            ctx.roundRect(cx - remSize/2, cy - remSize/2, remSize, remSize, 5);
                            ctx.fill();
                        } else {
                            const x = rect.x + swapOffset.x + moveOffset.x;
                            const y = rect.y + fallOffset + swapOffset.y + moveOffset.y;
                            
                            this.drawShape(ctx, shape, x, y, rect.width, rect.height, color, this.borderColor, false);
                            
                            if (this.selected && this.selected[0] === row && this.selected[1] === col && !this.isDragging) {
                                ctx.strokeStyle = '#ffffff';
                                ctx.lineWidth = 3;
                                ctx.beginPath();
                                ctx.roundRect(x - 2, y - 2, rect.width + 4, rect.height + 4, 5);
                                ctx.stroke();
                            }
                        }
                    }
                }
                
                // Перетаскиваемый блок
                if (this.isDragging && this.dragStartCell && !this.isAnimating) {
                    const [row, col] = this.dragStartCell;
                    if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE && this.grid[row][col] !== -1) {
                        const rect = this.getCellRect(row, col);
                        const colorIndex = this.grid[row][col];
                        const color = this.COLORS[colorIndex];
                        const shape = this.getShapeForColor(colorIndex);
                        
                        const scale = 1.15;
                        const w = rect.width * scale;
                        const h = rect.height * scale;
                        
                        const mouse = this._mousePos || { x: 0, y: 0 };
                        
                        ctx.shadowColor = 'rgba(0,0,0,0.5)';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 3;
                        ctx.shadowOffsetY = 3;
                        
                        ctx.globalAlpha = 0.85;
                        this.drawShape(ctx, shape, mouse.x - w/2, mouse.y - h/2, w, h, color, this.borderColor, false);
                        ctx.globalAlpha = 1;
                        
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                        
                        this.drawAdjacentHint(row, col);
                    }
                }
                
                for (const pos of this.dragTrail) {
                    if (pos !== this.dragStartCell) {
                        const [row, col] = pos;
                        const rect = this.getCellRect(row, col);
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 5);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                }
            }
            
            drawAdjacentHint(row, col) {
                const directions = [[-1,0], [1,0], [0,-1], [0,1]];
                for (const [dr, dc] of directions) {
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && this.grid[nr][nc] !== -1) {
                        const rect = this.getCellRect(nr, nc);
                        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 5);
                        ctx.stroke();
                    }
                }
            }
            
            // ==================== ОБРАБОТКА СОБЫТИЙ ====================
            
            setupEventListeners() {
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    let clientX, clientY;
                    
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    
                    const x = (clientX - rect.left) * scaleX;
                    const y = (clientY - rect.top) * scaleY;
                    return { x, y };
                };
                
                const onDown = (e) => {
                    const pos = getPos(e);
                    if (this.gameState === "MENU") {
                        this.handleMenuClick(pos.x, pos.y);
                    } else if (this.gameState === "PLAYING") {
                        this.handleMouseDown(pos);
                    } else if (this.gameState === "GAME_OVER") {
                        this.handleGameOverClick(pos.x, pos.y);
                    }
                };
                
                const onMove = (e) => {
                    const pos = getPos(e);
                    this._mousePos = pos;
                    
                    if (this.gameState === "PLAYING") {
                        this.handleMouseMove(pos);
                    }
                };
                
                const onUp = (e) => {
                    if (this.gameState === "PLAYING") {
                        const pos = getPos(e);
                        this.handleMouseUp(pos);
                    }
                };
                
                canvas.addEventListener('mousedown', onDown);
                canvas.addEventListener('mousemove', onMove);
                canvas.addEventListener('mouseup', onUp);
                canvas.addEventListener('mouseleave', onUp);
                
                canvas.addEventListener('touchstart', onDown, { passive: false });
                canvas.addEventListener('touchmove', onMove, { passive: false });
                canvas.addEventListener('touchend', onUp, { passive: false });
                
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'r' || e.key === 'R') {
                        if (this.gameState === "PLAYING") this.resetGame();
                    }
                    if (e.key === 'Escape') {
                        if (this.gameState === "PLAYING" || this.gameState === "GAME_OVER") {
                            this.saveCurrentScore();
                            this.saveScores();
                            this.gameState = "MENU";
                            this.selected = null;
                            this.gameOver = false;
                            this.showThemeMenu = false;
                            this.showBorderMenu = false;
                            this.showShapeMenu = false;
                        } else if (this.gameState === "MENU") {
                            this.running = false;
                        }
                    }
                    if (e.key === ' ' || e.key === 'Space') {
                        e.preventDefault();
                        if (this.gameState === "MENU") {
                            this.gameState = "PLAYING";
                            if (this.gameMode === "LEVELS") {
                                this.currentLevel = this.nextLevel;
                                this.levelTarget = 50 + (this.currentLevel - 1) * 50;
                            }
                            this.resetGame();
                            this.showThemeMenu = false;
                            this.showBorderMenu = false;
                            this.showShapeMenu = false;
                        }
                    }
                });
            }
            
            handleMenuClick(x, y) {
                const isMobile = window.innerWidth < 768;
                const btnWSmall = isMobile ? 130 : 160;
                const btnHSmall = isMobile ? 42 : 50;
                const spacingSmall = isMobile ? 10 : 15;
                const totalWidthSmall = btnWSmall * 3 + spacingSmall * 2;
                const startXSmall = (WIDTH - totalWidthSmall) / 2;
                const btnYSmall = isMobile ? 295 : 430;
                
                const themeBtn = { x: startXSmall, y: btnYSmall, w: btnWSmall, h: btnHSmall };
                const borderBtn = { x: startXSmall + btnWSmall + spacingSmall, y: btnYSmall, w: btnWSmall, h: btnHSmall };
                const shapeBtn = { x: startXSmall + (btnWSmall + spacingSmall) * 2, y: btnYSmall, w: btnWSmall, h: btnHSmall };
                
                // Закрытие меню при клике вне
                if (this.showThemeMenu || this.showBorderMenu || this.showShapeMenu) {
                    let clickedOnMenu = false;
                    
                    if (this.showThemeMenu) {
                        const menuX = themeBtn.x;
                        const menuY = themeBtn.y + themeBtn.h + 3;
                        const menuW = isMobile ? 160 : 190;
                        const menuH = Object.keys(COLOR_THEMES).length * (isMobile ? 32 : 40) + 8;
                        if (x >= menuX && x <= menuX + menuW && y >= menuY && y <= menuY + menuH) {
                            clickedOnMenu = true;
                        }
                    }
                    
                    if (this.showBorderMenu) {
                        const menuX = borderBtn.x;
                        const menuY = borderBtn.y + borderBtn.h + 3;
                        const menuW = isMobile ? 160 : 190;
                        const menuH = BORDER_COLORS.length * (isMobile ? 42 : 50) + 8;
                        if (x >= menuX && x <= menuX + menuW && y >= menuY && y <= menuY + menuH) {
                            clickedOnMenu = true;
                        }
                    }
                    
                    if (this.showShapeMenu) {
                        const menuX = shapeBtn.x;
                        const menuY = shapeBtn.y + shapeBtn.h + 3;
                        const menuW = isMobile ? 200 : 240;
                        const menuH = (2 * (isMobile ? 38 : 46) + 8) + 
                                     (this.currentShapeMode === 'uniform' ? ALL_SHAPES.length * (isMobile ? 38 : 46) + 4 : 0);
                        if (x >= menuX && x <= menuX + menuW && y >= menuY && y <= menuY + menuH) {
                            clickedOnMenu = true;
                        }
                    }
                    
                    if (!clickedOnMenu) {
                        this.showThemeMenu = false;
                        this.showBorderMenu = false;
                        this.showShapeMenu = false;
                        return;
                    }
                }
                
                // Кнопки режимов
                const btnW = isMobile ? 260 : 360;
                const btnH = isMobile ? 42 : 52;
                const btnStartX = (WIDTH - btnW) / 2;
                const btnY1 = isMobile ? 115 : 190;
                const btnY2 = isMobile ? 168 : 255;
                
                const classicBtn = { x: btnStartX, y: btnY1, w: btnW, h: btnH };
                const levelsBtn = { x: btnStartX, y: btnY2, w: btnW, h: btnH };
                
                if (x >= classicBtn.x && x <= classicBtn.x + classicBtn.w &&
                    y >= classicBtn.y && y <= classicBtn.y + classicBtn.h) {
                    this.gameMode = "CLASSIC";
                    this.currentLevel = 1;
                    this.levelTarget = 100;
                    return;
                }
                
                if (x >= levelsBtn.x && x <= levelsBtn.x + levelsBtn.w &&
                    y >= levelsBtn.y && y <= levelsBtn.y + levelsBtn.h) {
                    this.gameMode = "LEVELS";
                    this.currentLevel = this.nextLevel;
                    const levelKey = String(this.currentLevel);
                    if (this.bestScores.LEVELS && this.bestScores.LEVELS[levelKey]) {
                        this.levelTarget = this.bestScores.LEVELS[levelKey];
                    } else {
                        this.levelTarget = 50 + (this.currentLevel - 1) * 50;
                    }
                    return;
                }
                
                // Кнопка "Играть"
                const playW = isMobile ? 200 : 260;
                const playH = isMobile ? 52 : 62;
                const playX = (WIDTH - playW) / 2;
                const playY = isMobile ? 225 : 330;
                const playBtn = { x: playX, y: playY, w: playW, h: playH };
                
                if (x >= playBtn.x && x <= playBtn.x + playBtn.w &&
                    y >= playBtn.y && y <= playBtn.y + playBtn.h) {
                    this.gameState = "PLAYING";
                    if (this.gameMode === "LEVELS") {
                        this.currentLevel = this.nextLevel;
                        this.levelTarget = 50 + (this.currentLevel - 1) * 50;
                    }
                    this.resetGame();
                    this.showThemeMenu = false;
                    this.showBorderMenu = false;
                    this.showShapeMenu = false;
                }
                
                // Кнопки настроек
                if (x >= themeBtn.x && x <= themeBtn.x + themeBtn.w &&
                    y >= themeBtn.y && y <= themeBtn.y + themeBtn.h) {
                    this.showThemeMenu = !this.showThemeMenu;
                    this.showBorderMenu = false;
                    this.showShapeMenu = false;
                    return;
                }
                
                if (x >= borderBtn.x && x <= borderBtn.x + borderBtn.w &&
                    y >= borderBtn.y && y <= borderBtn.y + borderBtn.h) {
                    this.showBorderMenu = !this.showBorderMenu;
                    this.showThemeMenu = false;
                    this.showShapeMenu = false;
                    return;
                }
                
                if (x >= shapeBtn.x && x <= shapeBtn.x + shapeBtn.w &&
                    y >= shapeBtn.y && y <= shapeBtn.y + shapeBtn.h) {
                    this.showShapeMenu = !this.showShapeMenu;
                    this.showThemeMenu = false;
                    this.showBorderMenu = false;
                    return;
                }
                
                // Обработка кликов в меню выбора темы
                if (this.showThemeMenu) {
                    const menuX = themeBtn.x;
                    const menuY = themeBtn.y + themeBtn.h + 3;
                    const themeNames = Object.keys(COLOR_THEMES);
                    const itemHeight = isMobile ? 32 : 40;
                    const menuWidth = isMobile ? 160 : 190;
                    
                    for (let i = 0; i < themeNames.length; i++) {
                        const itemY = menuY + 4 + i * itemHeight;
                        if (x >= menuX && x <= menuX + menuWidth &&
                            y >= itemY && y <= itemY + itemHeight - 2) {
                            this.changeTheme(themeNames[i]);
                            this.showThemeMenu = false;
                            return;
                        }
                    }
                }
                
                // Обработка кликов в меню выбора обводки
                if (this.showBorderMenu) {
                    const menuX = borderBtn.x;
                    const menuY = borderBtn.y + borderBtn.h + 3;
                    const itemHeight = isMobile ? 42 : 50;
                    const menuWidth = isMobile ? 160 : 190;
                    
                    for (let i = 0; i < BORDER_COLORS.length; i++) {
                        const itemY = menuY + 4 + i * itemHeight;
                        if (x >= menuX && x <= menuX + menuWidth &&
                            y >= itemY && y <= itemY + itemHeight - 2) {
                            this.changeBorderColor(BORDER_COLORS[i].name);
                            this.showBorderMenu = false;
                            return;
                        }
                    }
                }
                
                // Обработка кликов в меню выбора формы
                if (this.showShapeMenu) {
                    const menuX = shapeBtn.x;
                    const menuY = shapeBtn.y + shapeBtn.h + 3;
                    const itemHeight = isMobile ? 38 : 46;
                    const menuWidth = isMobile ? 200 : 240;
                    
                    const modes = [
                        { id: 'individual', label: 'Индивидуальные' },
                        { id: 'uniform', label: 'Одинаковые' }
                    ];
                    
                    for (let i = 0; i < modes.length; i++) {
                        const itemY = menuY + 4 + i * itemHeight;
                        if (x >= menuX && x <= menuX + menuWidth &&
                            y >= itemY && y <= itemY + itemHeight - 2) {
                            this.changeShapeMode(modes[i].id);
                            this.showShapeMenu = false;
                            return;
                        }
                    }
                    
                    if (this.currentShapeMode === 'uniform') {
                        const startY = menuY + 4 + modes.length * itemHeight + 4;
                        for (let i = 0; i < ALL_SHAPES.length; i++) {
                            const itemY = startY + 4 + i * itemHeight;
                            if (x >= menuX && x <= menuX + menuWidth &&
                                y >= itemY && y <= itemY + itemHeight - 2) {
                                this.changeUniformShape(ALL_SHAPES[i]);
                                this.showShapeMenu = false;
                                return;
                            }
                        }
                    }
                }
            }
            
            handleGameOverClick(x, y) {
                if (!this._gameOverButtons) return;
                
                for (const btn of this._gameOverButtons) {
                    if (x >= btn.x && x <= btn.x + btn.w &&
                        y >= btn.y && y <= btn.y + btn.h) {
                        if (btn.text === "МЕНЮ") {
                            this.saveCurrentScore();
                            this.saveScores();
                            this.gameState = "MENU";
                            this.selected = null;
                            this.gameOver = false;
                            this.showThemeMenu = false;
                            this.showBorderMenu = false;
                            this.showShapeMenu = false;
                        } else if (btn.text === "ПОВТОРИТЬ") {
                            this.resetGame();
                            this.gameOver = false;
                            this.gameState = "PLAYING";
                        } else if (btn.text === "СЛЕДУЮЩИЙ УРОВЕНЬ") {
                            this.nextLevel = this.currentLevel + 1;
                            this.currentLevel = this.nextLevel;
                            this.levelTarget = 50 + (this.currentLevel - 1) * 50;
                            this.saveScores();
                            this.resetGame();
                            this.gameOver = false;
                            this.gameState = "PLAYING";
                        } else if (btn.text === "РЕКОРДЫ") {
                            this.showRecords();
                        }
                        return;
                    }
                }
            }
            
            handleMouseDown(pos) {
                if (this.isAnimating || this.gameOver) return;
                
                if (this._menuBtn) {
                    const btn = this._menuBtn;
                    if (pos.x >= btn.x && pos.x <= btn.x + btn.w &&
                        pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                        this.saveCurrentScore();
                        this.saveScores();
                        this.gameState = "MENU";
                        this.selected = null;
                        this.showThemeMenu = false;
                        this.showBorderMenu = false;
                        this.showShapeMenu = false;
                        return;
                    }
                }
                
                if (this._resetBtn) {
                    const btn = this._resetBtn;
                    if (pos.x >= btn.x && pos.x <= btn.x + btn.w &&
                        pos.y >= btn.y && pos.y <= btn.y + btn.h) {
                        this.resetGame();
                        return;
                    }
                }
                
                const gridPos = this.getGridPos(pos.x, pos.y);
                if (gridPos) {
                    const [row, col] = gridPos;
                    if (row >= 0 && row < GRID_SIZE && col >= 0 && col < GRID_SIZE && this.grid[row][col] !== -1) {
                        this.isDragging = true;
                        this.dragStartCell = gridPos;
                        this.dragCurrentCell = gridPos;
                        this.dragTrail = [];
                        this.selected = gridPos;
                    }
                }
            }
            
            handleMouseUp(pos) {
                if (!this.isDragging) return;
                
                if (this.dragStartCell) {
                    const gridPos = this.getGridPos(pos.x, pos.y);
                    
                    if (gridPos && gridPos !== this.dragStartCell) {
                        if (this.isAdjacent(this.dragStartCell, gridPos)) {
                            if (this.trySwap(this.dragStartCell, gridPos)) {
                                this.selected = null;
                            } else {
                                this.selected = this.dragStartCell;
                            }
                        } else {
                            this.selected = null;
                        }
                    } else {
                        if (this.selected === this.dragStartCell) {
                            this.selected = null;
                        } else {
                            this.selected = this.dragStartCell;
                        }
                    }
                }
                
                this.isDragging = false;
                this.dragStartCell = null;
                this.dragCurrentCell = null;
                this.dragTrail = [];
            }
            
            handleMouseMove(pos) {
                if (this.isDragging && this.dragStartCell) {
                    const gridPos = this.getGridPos(pos.x, pos.y);
                    if (gridPos && gridPos !== this.dragCurrentCell) {
                        this.dragCurrentCell = gridPos;
                        if (this.isAdjacent(this.dragStartCell, gridPos)) {
                            this.dragTrail.push(gridPos);
                            if (this.dragTrail.length > 5) {
                                this.dragTrail.shift();
                            }
                        }
                    }
                }
            }
            
            showRecords() {
                console.log("=== РЕКОРДЫ ===");
                console.log(`Классический режим: ${this.bestScores.CLASSIC}`);
                console.log(`Следующий уровень: ${this.bestScores.NEXT_LEVEL || 1}`);
                console.log("Пройденные уровни:");
                if (this.bestScores.LEVELS) {
                    for (const [level, score] of Object.entries(this.bestScores.LEVELS).sort((a, b) => Number(a[0]) - Number(b[0]))) {
                        console.log(`  Уровень ${level}: ${score}`);
                    }
                }
                console.log("================");
                alert("Рекорды сохранены в localStorage. Откройте консоль (F12) для просмотра.");
            }
            
            update() {
                if (this.moveAnimation.length > 0) {
                    this.updateMoveAnimation();
                    return;
                }
                
                this.updateAnimation();
                
                if (this.gameMode === "LEVELS" && this.score >= this.levelTarget && 
                    !this.isAnimating && !this.gameOver) {
                    this.gameOver = true;
                    const levelKey = String(this.currentLevel);
                    if (!this.bestScores.LEVELS[levelKey] || this.score > this.bestScores.LEVELS[levelKey]) {
                        this.bestScores.LEVELS[levelKey] = this.score;
                    }
                    this.nextLevel = this.currentLevel + 1;
                    this.saveScores();
                }
            }
            
            updateMoveAnimation() {
                if (this.moveAnimation.length > 0) {
                    let allDone = true;
                    for (const move of this.moveAnimation) {
                        if (move.progress < 1) {
                            move.progress += move.speed;
                            const t = move.progress;
                            const smoothT = t * t * (3 - 2 * t);
                            move.dx = move.endDx * smoothT;
                            move.dy = move.endDy * smoothT;
                            allDone = false;
                        } else {
                            move.dx = move.endDx;
                            move.dy = move.endDy;
                        }
                    }
                    
                    if (allDone) {
                        this.moveAnimation = [];
                        this.isAnimating = false;
                        if (this.processMatches()) {
                            this.isAnimating = true;
                        } else {
                            this.selected = null;
                            if (!this.hasValidMoves()) {
                                this.handleNoMoves();
                            }
                        }
                    }
                    return true;
                }
                return false;
            }
            
            // ==================== ИГРОВОЙ ЦИКЛ ====================
            
            gameLoop() {
                if (!this.running) return;
                
                if (this.gameState === "MENU") {
                    this.drawMenu();
                } else if (this.gameState === "PLAYING") {
                    this.update();
                    this.drawGrid();
                    if (this.gameOver) {
                        this.gameState = "GAME_OVER";
                    }
                } else if (this.gameState === "GAME_OVER") {
                    this.drawGameOver();
                }
                
                requestAnimationFrame(() => this.gameLoop());
            }
        }
        
        // ==================== ПОЛИФИЛЛЫ ====================
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
                const r = typeof radii === 'number' ? radii : (radii || 0);
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            };
        }
        
        // ==================== ЗАПУСК ====================
        
        const game = new MatchThreeGame();
    </script>
